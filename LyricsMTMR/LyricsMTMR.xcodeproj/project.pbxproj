  -compatibility_version 1.0 \
  -install_name "@rpath/MediaRemoteMRBridge.dylib"

echo "Copying run.pl..."
cp "${SRCROOT}/MTMR/Resources/run.pl" "${RESOURCES_DIR}/run.pl"
chmod +x "${RESOURCES_DIR}/run.pl"

echo "Done."
